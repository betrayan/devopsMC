name: Hello Node App to Docker

on:
    workflow_dispatch:
    push:
     paths:
      - 'Full-Stack-AI-DevOps-Masterclass-main/docker/app1-hello/node/**'
    
  

env:
  REGISTRY: docker.io
  IMAGE_NAME: hello-node-app

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: Full-Stack-AI-DevOps-Masterclass-main/docker/app1-hello/node
        run: npm install
        shell: bash

      - name: Run tests
        working-directory: Full-Stack-AI-DevOps-Masterclass-main/docker/app1-hello/node
        run: npm test --if-present
        shell: bash

      - name: Build Node app
        working-directory: Full-Stack-AI-DevOps-Masterclass-main/docker/app1-hello/node
        run: npm run build --if-present
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hello-node-artifacts
          path: |
            Full-Stack-AI-DevOps-Masterclass-main/docker/app1-hello/node/node_modules
            Full-Stack-AI-DevOps-Masterclass-main/docker/app1-hello/node/package.json
            Full-Stack-AI-DevOps-Masterclass-main/docker/app1-hello/node/app.js

  build-docker:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          echo "tags=hello-node-app:latest,hello-node-app:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: Full-Stack-AI-DevOps-Masterclass-main/docker/app1-hello/node
          file: Full-Stack-AI-DevOps-Masterclass-main/docker/app1-hello/node/dockerfile
          push: false
          tags: hello-node-app:latest,hello-node-app:${{ github.sha }}

      - name: Save Docker image as tar
        run: |
          docker build -t hello-node-app:latest Full-Stack-AI-DevOps-Masterclass-main/docker/app1-hello/node
          docker save hello-node-app:latest -o hello-node-app.tar
        shell: bash

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-node-image
          path: hello-node-app.tar
