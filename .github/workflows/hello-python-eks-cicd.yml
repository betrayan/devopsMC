name: Python Docker to Amazon EKS CI/CD

on:
  workflow_dispatch:

  push:
    paths:
      - 'docker/app1-hello/python/**'
      - 'k8s/aws/app1-hello/**'

env:
  IMAGE_NAME: mlvijay/hello-python
  CLUSTER_NAME: hello-clus
  AWS_REGION: ap-south-1
  NAMESPACE: app1-hello

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: docker/app1-hello/python
          file: docker/app1-hello/python/dockerfile
          push: true
          tags: |
            mlvijay/hello-python:latest
            mlvijay/hello-python:${{ github.sha }}

  deploy:

    needs: build-and-push

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      - name: Verify Cluster
        run: |
          kubectl get nodes

      - name: Update Deployment Image
        run: |
          kubectl set image deployment/hello-python \
          hello-python=mlvijay/hello-python:${{ github.sha }} \
          -n app1-hello

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/hello-python \
          -n app1-hello

      - name: Verify Pods
        run: |
          kubectl get pods -n app1-hello

      - name: Verify Service
        run: |
          kubectl get svc -n app1-hello