name: Hello Python CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Full-Stack-AI-DevOps-Masterclass-main/docker/app1-hello/python/**"
      - ".github/workflows/hello-python-ci.yml"

permissions:
  contents: read

env:
  APP_DIR: Full-Stack-AI-DevOps-Masterclass-main/docker/app1-hello/python
  IMAGE_NAME: hello-python-app

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ env.APP_DIR }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: python -m pip install -r requirements.txt

      - name: Check Python syntax
        working-directory: ${{ env.APP_DIR }}
        run: python -m py_compile main.py

      - name: Test Flask endpoint
        working-directory: ${{ env.APP_DIR }}
        run: |
          python - <<'PY'
          from main import app

          response = app.test_client().get("/")
          assert response.status_code == 200
          assert response.get_json()["message"] == "Hello from Simple App (Python Flask)"
          PY

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
